<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nonsense Kanji — Ando Takahiro</title>
<link rel="stylesheet" href="../style.css?v=6">
<style>
.cp-hero { padding: 60px 40px 56px; border-bottom: 1px solid var(--border); text-align: center; }
.cp-title { font-size: clamp(36px, 6vw, 72px); font-weight: 200; letter-spacing: .1em; line-height: 1.1; margin-bottom: 16px; }
.cp-subtitle { font-size: 13px; letter-spacing: .2em; color: var(--muted); }
.cp-grid { padding: 64px 40px 80px; }
.cp-grid .grid-label { text-align: center; margin-bottom: 40px; }
.cp-grid .grid { max-width: 1100px; margin: 0 auto; }
</style>
</head>
<body class="has-nav">
<nav>
  <span class="nav-logo">Ando Takahiro</span>
  <a class="nav-back" href="../index.html">← 戻る</a>
</nav>

<section class="cp-hero">
  <h1 class="cp-title">Nonsense Kanji</h1>
  <p class="cp-subtitle">- Generative Art -</p>
</section>

<section class="cp-grid">
  <div class="grid-label">作品</div>
  <div class="grid">

    <a class="card" href="morph.html">
      <div class="card-thumb">
        <video autoplay muted loop playsinline>
          <source src="../assets/videos/nonsense-kanji/nk_morph001.mp4" type="video/mp4">
        </video>
      </div>
      <div class="card-body">
        <div class="card-tag">01 — 生成</div>
        <div class="card-title">Kanji Morphing</div>
        <div class="card-desc">フローマッチング拡散モデルが漢字の形状を補間し、意味を無視して形を連続変換する。</div>
        <div class="card-arrow">作品を見る →</div>
      </div>
    </a>

    <a class="card" href="tsne.html">
      <div class="card-thumb card-thumb--contain">
        <img src="../assets/images/nonsense-kanji/tsne_samune.png" alt="T-SNE">
      </div>
      <div class="card-body">
        <div class="card-tag">02 — 可視化</div>
        <div class="card-title">T-SNE</div>
        <div class="card-desc">漢字の潜在空間を t-SNE で射影し、肉眼では見えないクラスターと連続性を可視化する。</div>
        <div class="card-arrow">作品を見る →</div>
      </div>
    </a>

    <a class="card" href="tree.html">
      <div class="card-thumb card-thumb--contain">
        <img src="../assets/images/nonsense-kanji/nk_tree_samune.png" alt="Kanji Tree">
      </div>
      <div class="card-body">
        <div class="card-tag">03 — 構造</div>
        <div class="card-title">Kanji Tree</div>
        <div class="card-desc">拡散モデルが生成した漢字形状の系譜をインタラクティブに構築・探索するツール。</div>
        <div class="card-arrow">作品を見る →</div>
      </div>
    </a>

  </div>
</section>

<footer>
  <span>Ando Takahiro</span>
</footer>
</body>
</html>
